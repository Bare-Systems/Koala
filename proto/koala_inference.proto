syntax = "proto3";

package koala.inference.v1;

option go_package = "github.com/barelabs/koala/proto/inferencev1";

message BBox {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
}

message Detection {
  string camera_id = 1;
  string zone_id = 2;
  string label = 3;
  float confidence = 4;
  BBox bbox = 5;
  int64 timestamp_unix_ms = 6;
}

message FrameRequest {
  string request_id = 1;
  string camera_id = 2;
  string zone_id = 3;
  bytes frame = 4;
  int64 captured_at_unix_ms = 5;
}

message FrameResponse {
  string model_version = 1;
  repeated Detection detections = 2;
}

message BatchRequest {
  string request_id = 1;
  repeated FrameRequest frames = 2;
}

message BatchResponse {
  string model_version = 1;
  repeated FrameResponse responses = 2;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string version = 2;
}

service InferenceWorker {
  rpc AnalyzeFrame(FrameRequest) returns (FrameResponse);
  rpc AnalyzeBatch(BatchRequest) returns (BatchResponse);
  rpc WorkerHealth(HealthRequest) returns (HealthResponse);
}
