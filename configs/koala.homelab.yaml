config_version: "1"
listen_addr: ":8082"
mcp_token: "koala-dev-token"
service:
  device_id: "koala-blink-homelab"
  version: "0.1.0-dev"
  address: "http://192.168.86.53:8082"
worker:
  # When the orchestrator uses host networking, it must talk to the worker
  # through the worker's published host port rather than Docker DNS.
  url: "http://127.0.0.1:8092"
  grpc_addr: "127.0.0.1:6706"
  protocol: "http"
runtime:
  queue_size: 64
  freshness_window_seconds: 90
  enable_stream_workers: true
  stream_sample_fps: 1
  stream_capture_timeout_seconds: 10
  min_detections: 1
  confidence_threshold: 0.5
update:
  enabled: false
  rotation_only_mode: false
  poll_enabled: false
  poll_interval_seconds: 300
  poll_jitter_seconds: 30
  manifest_url: ""
  active_key_id: ""
  previous_keys: []
  public_keys: {}
  public_key_base64: ""
  encryption_key_base64: ""
  audit_db_path: "/tmp/koala/audit/events.db"
  staging_dir: "/tmp/koala/staging"
  active_dir: "/tmp/koala/active"
privacy:
  metadata_retention_seconds: 90
  frame_buffer_enabled: true
zones:
  - id: "front_door"
    name: "Front Door"
cameras:
  - id: "cam_1"
    name: "CAM 1"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=1&stream=0.sdp?real_stream"
    zone_id: "front_door"
    front_door: true
    probe_at_boot: true
  - id: "cam_2"
    name: "CAM 2"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=2&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_3"
    name: "CAM 3"
