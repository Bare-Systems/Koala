listen_addr: ":6705"
mcp_token: "change-me"
service:
  device_id: "koala-jetson-frontdoor-01"
  version: "0.1.0-dev"
  address: "http://192.168.1.50:6705"
worker:
  url: "http://koala-worker:6704"
update:
  enabled: false
  rotation_only_mode: false
  poll_enabled: false
  poll_interval_seconds: 300
  poll_jitter_seconds: 30
  manifest_url: ""
  active_key_id: "key-2026-03"
  previous_keys: []
  public_keys:
    key-2026-03: ""
  public_key_base64: ""
  encryption_key_base64: ""
  audit_db_path: "/tmp/koala/audit/events.db"
  staging_dir: "/tmp/koala/staging"
  active_dir: "/tmp/koala/active"
runtime:
  queue_size: 64
  freshness_window_seconds: 90
  enable_stream_workers: true
  stream_sample_fps: 1
  stream_capture_timeout_seconds: 5
zones:
  - id: "front_door"
    name: "Front Door"
cameras:
  - id: "cam_front_1"
    name: "Front Door Camera"
    rtsp_url: "rtsp://dvr.local:554/ch1"
    onvif_url: "http://dvr.local/onvif/device_service"
    zone_id: "front_door"
    front_door: true
    probe_at_boot: true
