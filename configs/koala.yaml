config_version: "1"
listen_addr: ":8080"
mcp_token: "change-me"
service:
  device_id: "koala-jetson-frontdoor-01"
  version: "0.1.0-dev"
  address: "http://192.168.1.50:8080"
worker:
  url: "http://koala-worker:8090"
update:
  enabled: false
  rotation_only_mode: false
  poll_enabled: false
  poll_interval_seconds: 300
  poll_jitter_seconds: 30
  manifest_url: ""
  active_key_id: "key-2026-03"
  previous_keys: []
  public_keys:
    key-2026-03: ""
  public_key_base64: ""
  encryption_key_base64: ""
  audit_db_path: "/tmp/koala/audit/events.db"
  staging_dir: "/tmp/koala/staging"
  active_dir: "/tmp/koala/active"
runtime:
  queue_size: 64
  freshness_window_seconds: 90
  enable_stream_workers: true
  stream_sample_fps: 1
  stream_capture_timeout_seconds: 5
zones:
  - id: "front_door"
    name: "Front Door"
cameras:
  - id: "cam_1"
    name: "CAM 1"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=1&stream=0.sdp?real_stream"
    zone_id: "front_door"
    front_door: true
    probe_at_boot: true
