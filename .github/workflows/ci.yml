name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go: vet · lint · build · test ──────────────────────────────────────────
  go:
    name: Go — vet / lint / build / test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # Re-use the module cache set up by actions/setup-go.
          skip-cache: false

      - name: go build
        run: go build ./...

      - name: go test (race detector)
        run: go test -race -timeout 120s ./...

  # ── Python: lint · type-check · test ───────────────────────────────────────
  python:
    name: Python — lint / mypy / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/pyproject.toml

      - name: Install dependencies
        # Install base deps only (no ultralytics/GPU extras) so CI stays fast.
        # Tests use the deterministic fallback detector, not the live ML model.
        run: pip install -e "." ruff mypy

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy koala_worker

      - name: pytest
        run: python -m pytest -v
