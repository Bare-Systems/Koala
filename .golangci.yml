run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/baresystems/koala

issues:
  exclude-rules:
    # Test files can use fmt.Println and skip error checks
    - path: _test\.go
      linters:
        - errcheck
