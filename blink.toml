[blink]
version = "1"

# ── Target ────────────────────────────────────────────────────────────────────

[targets.homelab]
type        = "ssh"
host        = "blink"
user        = "admin"
base        = "/home/admin/baresystems"
runtime_dir = "/home/admin/baresystems/runtime/koala"
publish_host = "192.168.86.53"
api_port     = "8082"
worker_port  = "8092"
compose_project = "koala"

# ═══════════════════════════════════════════════════════════════════════════════
# koala-homelab — authoritative blink camera stack
# Ports: 8082 (Koala API on host), 8092 (worker HTTP on host loopback)
# Network contract:
#   - koala-orchestrator runs on host networking
#   - koala-worker stays on bridge networking and is published to 127.0.0.1:8092
#   - BearClaw consumes Koala at http://192.168.86.53:8082
#   - no Koala Live UI is deployed in homelab
#   - the runtime config file is seeded from configs/koala.homelab.yaml on first deploy
# ═══════════════════════════════════════════════════════════════════════════════

[services.koala-homelab]
description  = "Koala homelab stack - host-networked orchestrator with loopback worker"
service_name = "koala-homelab"

[services.koala-homelab.source]
type          = "containerized_local_build"
image         = "docker:cli"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "docker compose --project-name koala -f docker-compose.blink.yml build && docker tag koala-koala-orchestrator:latest registry.home/koala-orchestrator:latest && docker tag koala-koala-worker:latest registry.home/koala-worker:latest && docker push registry.home/koala-orchestrator:latest && docker push registry.home/koala-worker:latest && mkdir -p dist && tar -czf dist/koala-homelab-config.tgz docker-compose.blink.yml configs/"
artifact      = "dist/koala-homelab-config.tgz"
docker_socket = true

[services.koala-homelab.deploy]
target            = "homelab"
pipeline          = ["fetch_artifact", "provision", "stop", "install", "start", "health_check", "verify"]
rollback_pipeline = ["stop", "start", "health_check", "verify"]

[services.koala-homelab.provision]
dirs = [
  "{{runtime_dir}}/staging",
  "{{runtime_dir}}/logs"
]

[services.koala-homelab.provision.env_file]
path = "{{runtime_dir}}/.env"

[services.koala-homelab.provision.env_file.seed]
KOALA_CONFIG_PATH = "{{runtime_dir}}/koala.homelab.yaml"
KOALA_WORKER_PORT = "{{worker_port}}"

[services.koala-homelab.stop]
command = "if [ -f {{runtime_dir}}/docker-compose.blink.yml ]; then docker compose --project-name {{compose_project}} -f {{runtime_dir}}/docker-compose.blink.yml down --remove-orphans; fi"

[services.koala-homelab.install]
dest = "runtime/koala/staging/koala-homelab-config.tgz"

[services.koala-homelab.start]
command = "tar --overwrite -xzf {{runtime_dir}}/staging/koala-homelab-config.tgz -C {{runtime_dir}} && if [ ! -f {{runtime_dir}}/koala.homelab.yaml ] && [ -f {{runtime_dir}}/configs/koala.homelab.yaml ]; then cp {{runtime_dir}}/configs/koala.homelab.yaml {{runtime_dir}}/koala.homelab.yaml; fi && if [ -f {{runtime_dir}}/configs/koala.homelab.yaml ]; then cp {{runtime_dir}}/configs/koala.homelab.yaml {{runtime_dir}}/configs/koala.yaml; fi && docker pull registry.home:5000/koala-orchestrator:latest && docker tag registry.home:5000/koala-orchestrator:latest koala-koala-orchestrator:latest && docker pull registry.home:5000/koala-worker:latest && docker tag registry.home:5000/koala-worker:latest koala-koala-worker:latest && docker compose --project-name {{compose_project}} -f {{runtime_dir}}/docker-compose.blink.yml up -d --remove-orphans"

[services.koala-homelab.health_check]
url      = "http://127.0.0.1:{{api_port}}/healthz"
timeout  = 90
interval = 3

[services.koala-homelab.verify]
tags = ["smoke", "health"]

[services.koala-homelab.verify.tests.api-health-loopback]
type          = "http"
url           = "http://127.0.0.1:{{api_port}}/healthz"
expect_status = 200
tags          = ["smoke", "health"]

[services.koala-homelab.verify.tests.api-health-published]
type          = "http"
url           = "http://{{publish_host}}:{{api_port}}/healthz"
expect_status = 200
tags          = ["smoke", "health"]

[services.koala-homelab.verify.tests.worker-health]
type          = "http"
url           = "http://127.0.0.1:{{worker_port}}/v1/health"
expect_status = 200
tags          = ["smoke", "health"]

[services.koala-homelab.verify.tests.orchestrator-network-mode]
type          = "shell"
command       = "docker inspect --format '{{.HostConfig.NetworkMode}}' {{compose_project}}-koala-orchestrator-1 2>/dev/null"
expect_output = "host"
tags          = ["health"]

[services.koala-homelab.verify.tests.orchestrator-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' {{compose_project}}-koala-orchestrator-1 2>/dev/null"
expect_output = "running"
tags          = ["health"]

[services.koala-homelab.verify.tests.worker-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' {{compose_project}}-koala-worker-1 2>/dev/null"
expect_output = "running"
tags          = ["health"]

[services.koala-homelab.verify.tests.worker-port-published]
type          = "shell"
command       = "docker ps --filter name=^/{{compose_project}}-koala-worker-1$ --format '{{.Ports}}'"
expect_output = "/127\\.0\\.0\\.1:8092->8090\\/tcp/"
tags          = ["health"]

# ═══════════════════════════════════════════════════════════════════════════════
# koala-orchestrator — Go binary, manages camera feeds and inference dispatch
# Ports: 6704 (MCP + HTTP)
# blink homelab note:
#   - the stable camera deployment on blink does NOT use bridge networking for
#     the orchestrator
#   - preserve the host-networked orchestrator pattern documented in
#     docs/homelab-networking.md whenever you update this manifest
#   - BearClaw consumes Koala at http://192.168.86.53:8082
# ═══════════════════════════════════════════════════════════════════════════════

[services.koala-orchestrator]
description  = "Koala orchestrator — camera management and inference dispatch"
port         = "6704"
service_name = "koala-orchestrator"

# ── Source ────────────────────────────────────────────────────────────────────

[services.koala-orchestrator.source]
workdir = "."
default = "linux-amd64"

[services.koala-orchestrator.source.builds.linux-amd64]
type          = "containerized_local_build"
image         = "docker:cli"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "docker run --rm --platform linux/amd64 -v ${BLINK_WORKSPACE_HOST}:/workspace -w /workspace golang:1.24 sh -c 'export PATH=/usr/local/go/bin:$PATH && mkdir -p bin && GOCACHE=/tmp/go-build GOMODCACHE=/tmp/go-mod GOOS=linux GOARCH=amd64 go build -o bin/koala-orchestrator-linux-amd64 ./cmd/koala-orchestrator' && mkdir -p dist && cp bin/koala-orchestrator-linux-amd64 dist/koala-orchestrator && printf 'FROM debian:bookworm-slim\\nRUN apt-get update && apt-get install -y --no-install-recommends ca-certificates curl ffmpeg && rm -rf /var/lib/apt/lists/*\\nCOPY koala-orchestrator /usr/local/bin/koala-orchestrator\\nRUN chmod +x /usr/local/bin/koala-orchestrator\\nCMD [\"/usr/local/bin/koala-orchestrator\", \"-config\", \"/etc/koala/koala.yaml\"]\\n' > dist/Dockerfile.koala-orchestrator && docker buildx build --platform linux/amd64 --load -t koala-orchestrator:local -f dist/Dockerfile.koala-orchestrator dist/ && docker tag koala-orchestrator:local registry.home/koala-orchestrator:latest && docker push registry.home/koala-orchestrator:latest"
docker_socket = true

[services.koala-orchestrator.source.builds.linux-arm64]
type     = "containerized_local_build"
image    = "golang:1.24"
mount    = ".:/workspace"
workdir  = "/workspace"
command  = "export PATH=/usr/local/go/bin:$PATH && mkdir -p bin && GOCACHE=/tmp/go-build GOMODCACHE=/tmp/go-mod GOOS=linux GOARCH=arm64 go build -o bin/koala-orchestrator-linux-arm64 ./cmd/koala-orchestrator"
artifact = "bin/koala-orchestrator-linux-arm64"

# ── Pipeline ──────────────────────────────────────────────────────────────────

[services.koala-orchestrator.deploy]
target            = "homelab"
pipeline          = ["provision", "stop", "start", "health_check", "verify"]
rollback_pipeline = ["stop", "start", "health_check"]

# ── Provision ─────────────────────────────────────────────────────────────────

[services.koala-orchestrator.provision]
dirs = [
  "{{runtime_dir}}/orchestrator/staging",
  "{{runtime_dir}}/orchestrator/data",
  "{{runtime_dir}}/orchestrator/logs",
  "{{runtime_dir}}/orchestrator/capability-cache"
]

[services.koala-orchestrator.provision.env_file]
path = "{{runtime_dir}}/orchestrator/koala-orchestrator.env"

[services.koala-orchestrator.provision.env_file.seed]
KOALA_MCP_TOKEN  = "replace-me"
KOALA_DEVICE_ID  = "homelab-01"

# ── Stop ──────────────────────────────────────────────────────────────────────

[services.koala-orchestrator.stop]
command = "docker stop koala-orchestrator 2>/dev/null || true && docker rm koala-orchestrator 2>/dev/null || true"

# ── Start: pull image from registry and run container ────────────────────────

[services.koala-orchestrator.start]
command = "docker pull registry.home:5000/koala-orchestrator:latest && docker tag registry.home:5000/koala-orchestrator:latest koala-orchestrator:local && docker run -d --name koala-orchestrator --restart unless-stopped -p 127.0.0.1:{{port}}:{{port}} -v {{runtime_dir}}/orchestrator/data:/etc/koala -v {{runtime_dir}}/orchestrator/capability-cache:/var/cache/koala -v {{runtime_dir}}/orchestrator/logs:/var/log/koala -e KOALA_LISTEN_ADDR=:{{port}} --env-file {{runtime_dir}}/orchestrator/koala-orchestrator.env koala-orchestrator:local"

# ── Health check ──────────────────────────────────────────────────────────────

[services.koala-orchestrator.health_check]
url      = "http://127.0.0.1:{{port}}/healthz"
timeout  = 30
interval = 2

# ── Inline tests ──────────────────────────────────────────────────────────────

[services.koala-orchestrator.verify]
tags = ["smoke", "health"]

[services.koala-orchestrator.verify.tests.health]
type          = "http"
url           = "http://127.0.0.1:{{port}}/healthz"
expect_status = 200
tags          = ["smoke"]

[services.koala-orchestrator.verify.tests.container-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' koala-orchestrator 2>/dev/null"
expect_output = "running"
tags          = ["health"]

[services.koala-orchestrator.verify.tests.auth-required]
type          = "http"
url           = "http://127.0.0.1:{{port}}/mcp/tools/koala.get_system_health"
expect_status = 401
tags          = ["smoke"]


# ═══════════════════════════════════════════════════════════════════════════════
# koala-worker — Python inference worker (YOLO), gRPC transport
# Port: 6706 (gRPC)
#
# Note: the worker is Python and built from source on the remote host.
# The pipeline uses remote_script.inline rather than fetch_artifact since
# there is no local cross-compiled binary to ship. Source is expected to be
# checked out at {{runtime_dir}}/worker/src on the remote (one-time setup).
# ═══════════════════════════════════════════════════════════════════════════════

[services.koala-worker]
description  = "Koala inference worker — YOLO object detection"
grpc_port    = "6706"
service_name = "koala-worker"

# ── Source: build the worker image locally and push to registry ───────────────

[services.koala-worker.source]
type          = "containerized_local_build"
image         = "docker:cli"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "docker buildx build --platform linux/amd64 --load -t koala-worker:local . && docker tag koala-worker:local registry.home/koala-worker:latest && docker push registry.home/koala-worker:latest"
docker_socket = true

# ── Pipeline ──────────────────────────────────────────────────────────────────

[services.koala-worker.deploy]
target            = "homelab"
pipeline          = ["provision", "stop", "remote_script", "health_check", "verify"]
rollback_pipeline = ["stop", "remote_script", "health_check"]

# ── Provision ─────────────────────────────────────────────────────────────────

[services.koala-worker.provision]
dirs = [
  "{{runtime_dir}}/worker/src",
  "{{runtime_dir}}/worker/models",
  "{{runtime_dir}}/worker/logs"
]

# ── Stop ──────────────────────────────────────────────────────────────────────

[services.koala-worker.stop]
command = "docker stop koala-worker 2>/dev/null || true && docker rm koala-worker 2>/dev/null || true"

# ── Remote script: build image from source and run container ──────────────────
# Source must be checked out to {{runtime_dir}}/worker/src before first deploy.
# Run once: git clone https://github.com/Bare-Labs/Koala worker/src

[services.koala-worker.remote_script]
inline = """
set -e
docker pull registry.home:5000/koala-worker:latest
docker tag registry.home:5000/koala-worker:latest koala-worker:local
docker run -d \
  --name koala-worker \
  --restart unless-stopped \
  -p 127.0.0.1:{{grpc_port}}:{{grpc_port}} \
  -v {{runtime_dir}}/worker/models:/models \
  -e KOALA_TRANSPORT=grpc \
  -e KOALA_GRPC_PORT={{grpc_port}} \
  koala-worker:local
"""

# ── Health check: verify the container is accepting connections ───────────────
# gRPC health is checked via container state (no HTTP endpoint in gRPC mode).

[services.koala-worker.health_check]
url      = "http://127.0.0.1:6704/mcp/tools/koala.get_system_health"
timeout  = 45
interval = 3

# ── Inline tests ──────────────────────────────────────────────────────────────

[services.koala-worker.verify]
tags = ["smoke", "health"]

[services.koala-worker.verify.tests.container-running]
type          = "shell"
command       = "docker inspect --format '{{.State.Status}}' koala-worker 2>/dev/null"
expect_output = "running"
tags          = ["smoke", "health"]

[services.koala-worker.verify.tests.grpc-port-open]
type          = "shell"
command       = "ss -tlnp 2>/dev/null | grep -q ':{{grpc_port}}' && echo listening || echo closed"
expect_output = "listening"
tags          = ["smoke"]
