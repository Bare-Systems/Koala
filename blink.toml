[blink]
version = "1"

# ── Target ────────────────────────────────────────────────────────────────────

[targets.jetson]
type        = "ssh"
host        = "jetson"            # add to ~/.ssh/config when hardware is ready
user        = "joe"
base        = "/home/joe/baresystems"
runtime_dir = "/home/joe/baresystems/runtime/koala"
publish_host = "jetson"           # update with Jetson's LAN IP
api_port    = "8082"
grpc_port   = "6706"

# ═══════════════════════════════════════════════════════════════════════════════
# koala-worker — Python inference worker (YOLO)
# Target: Jetson Orin Nano (native Python, no Docker)
# Port: 8090 (HTTP)
#
# Build: wheel built locally, scp'd to Jetson, pip-installed there.
# One-time Jetson setup: pip3 install grpcio ultralytics
# ═══════════════════════════════════════════════════════════════════════════════

[services.koala-worker]
description  = "Koala inference worker — YOLO object detection"
port         = "8090"
service_name = "koala-worker"

[services.koala-worker.logs]
command = "tail -n 200 /home/joe/baresystems/runtime/koala/worker/logs/worker.log"

# ── Source: build wheel locally ───────────────────────────────────────────────

[services.koala-worker.source]
default  = "wheel"

[services.koala-worker.source.builds.wheel]
type     = "containerized_local_build"
image    = "python:3.11-slim"
mount    = "worker:/workspace"
workdir  = "/workspace"
command  = "pip install --quiet build && rm -rf dist && python3 -m build --wheel --outdir dist && mv dist/koala_worker-*.whl dist/koala_worker-latest.whl"
artifact = "dist/koala_worker-latest.whl"

# ── Pipeline ──────────────────────────────────────────────────────────────────

[services.koala-worker.deploy]
target            = "jetson"
priority          = 1
pipeline = ["fetch_artifact", "provision", "stop", "install", "start", "health_check", "verify"]

# ── Provision ─────────────────────────────────────────────────────────────────

[services.koala-worker.provision]
dirs = [
  "{{runtime_dir}}/worker/models",
  "{{runtime_dir}}/worker/logs",
]
# One-time Jetson GPU setup (run manually on the Jetson — too slow for deploy pipeline).
# Official NVIDIA docs: https://docs.nvidia.com/deeplearning/frameworks/install-pytorch-jetson-platform/
#
#   sudo apt-get install -y python3-pip libopenblas-dev
#
#   # cuSPARSELt — required for PyTorch 24.06+ builds
#   wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/arm64/cuda-keyring_1.1-1_all.deb
#   sudo dpkg -i cuda-keyring_1.1-1_all.deb && sudo apt-get update
#   sudo apt-get install -y libcusparselt0 libcusparselt-dev
#
#   pip3 install 'numpy==1.26.1'
#
#   # PyTorch 2.5.0 official wheel for JetPack 6.1 / R36.4 / Python 3.10
#   pip3 install --no-cache \
#     https://developer.download.nvidia.com/compute/redist/jp/v61/pytorch/torch-2.5.0a0+872d972e41.nv24.08.17622132-cp310-cp310-linux_aarch64.whl
#
#   python3 -c 'import torch; print("cuda:", torch.cuda.is_available())'
#   pip3 install ultralytics

# ── Install: scp wheel to Jetson ──────────────────────────────────────────────

[services.koala-worker.install]
dest = "runtime/koala/worker/koala_worker-latest.whl"

# ── Stop ──────────────────────────────────────────────────────────────────────

[services.koala-worker.stop]
command = "pkill -f 'koala_worker' 2>/dev/null || true; sleep 2; fuser -k 8090/tcp 2>/dev/null || true; sleep 1"

# ── Start: install wheel then launch ─────────────────────────────────────────

[services.koala-worker.start]
command = "python3 -c \"import zipfile,shutil; shutil.rmtree('{{runtime_dir}}/worker/site', ignore_errors=True); zipfile.ZipFile('{{runtime_dir}}/worker/koala_worker-latest.whl').extractall('{{runtime_dir}}/worker/site')\" && (KOALA_TRANSPORT=http KOALA_MODEL_DIR={{runtime_dir}}/worker/models PYTHONPATH={{runtime_dir}}/worker/site nohup python3 -m koala_worker.server < /dev/null >> {{runtime_dir}}/worker/logs/worker.log 2>&1 &)"

# ── Health check ──────────────────────────────────────────────────────────────

[services.koala-worker.health_check]
url      = "http://127.0.0.1:{{port}}/v1/health"
timeout  = 60
interval = 3

# ── Inline tests ──────────────────────────────────────────────────────────────

[services.koala-worker.verify]
tags = ["smoke", "health"]

[services.koala-worker.verify.tests.process-running]
type          = "shell"
command       = "pgrep -f 'koala_worker.server' >/dev/null 2>&1 && echo running || echo stopped"
expect_output = "running"
tags          = ["smoke", "health"]

[services.koala-worker.verify.tests.http-port-open]
type          = "shell"
command       = "ss -tlnp 2>/dev/null | grep -q ':{{port}}' && echo listening || echo closed"
expect_output = "listening"
tags          = ["smoke"]

[services.koala-worker.verify.tests.gpu-inference-ready]
type          = "shell"
command       = "python3 -c 'import torch; print(\"cuda\" if torch.cuda.is_available() else \"cpu\")' 2>/dev/null || echo cpu"
expect_output = "cuda"
tags          = ["gpu"]

[services.koala-worker.verify.tests.live-detections]
type          = "shell"
command       = "curl -sf -X POST http://127.0.0.1:8082/mcp/tools/koala.get_zone_state -H 'Authorization: Bearer koala-dev-token' -H 'Content-Type: application/json' -d '{\"input\":{\"zone_id\":\"front_door\"}}' 2>/dev/null | python3 -c \"import sys,json; d=json.load(sys.stdin); data=d.get('data',{}); stale=data.get('stale',True); entities={e['label']:e['present'] for e in data.get('entities',[])}; present=[k for k,v in entities.items() if v]; print('ok stale=' + str(stale) + ' present=' + str(present if present else 'none'))\" 2>/dev/null || echo 'ok stale=error'"
expect_output = "ok stale=True present=none"
tags          = ["live"]

[services.koala-worker.verify.tests.gpu-diagnostics]
type          = "shell"
command       = "python3 -c 'import torch; print(torch.__version__); print(torch.cuda.is_available()); print(torch.version.cuda); import subprocess; r=subprocess.run([\"ldconfig\",\"-p\"],capture_output=True,text=True); print(\"cusparseLt\" in r.stdout)' 2>&1 | tr '\\n' '|'"
expect_output = "2.5.0a0+872d972e41.nv24.08|True|12.6|True|"
tags          = ["gpu-diag"]

[services.koala-worker.verify.tests.zone-state-raw]
type          = "shell"
command       = "curl -sf -X POST http://127.0.0.1:8082/mcp/tools/koala.get_zone_state -H 'Authorization: Bearer koala-dev-token' -H 'Content-Type: application/json' -d '{\"input\":{\"zone_id\":\"front_door\"}}' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=None))' 2>/dev/null | cut -c1-300"
expect_output = ""
tags          = ["zone-raw"]

[services.koala-worker.verify.tests.ingest-status]
type          = "shell"
command       = "curl -sf http://127.0.0.1:8082/admin/ingest/status -H 'Authorization: Bearer koala-dev-token' 2>/dev/null | python3 -c 'import sys,json; d=json.load(sys.stdin); cams=d.get(\"data\",{}).get(\"cameras\",{}); print(json.dumps({k:{\"ok\":v.get(\"success_count\",0),\"fail\":v.get(\"failure_count\",0),\"last_err\":v.get(\"last_error\",\"\")} for k,v in cams.items()}))' 2>/dev/null | cut -c1-400"
expect_output = ""
tags          = ["ingest"]

[services.koala-worker.verify.tests.orchestrator-logs]
type          = "shell"
command       = "tail -n 30 /home/joe/baresystems/runtime/koala/orchestrator/logs/orchestrator.log 2>/dev/null | strings | tail -n 20"
expect_output = ""
tags          = ["orch-log"]

[services.koala-worker.verify.tests.dvr-reachable]
type          = "shell"
command       = "nc -zw3 192.168.86.46 554 2>/dev/null && echo reachable || echo unreachable"
expect_output = "reachable"
tags          = ["dvr"]

# dvr-info: probe the DVR HTTP interface for model/version info.
[services.koala-worker.verify.tests.dvr-info]
type          = "shell"
command       = "for URL in 'rtsp://192.168.86.46/h264/ch01/main/av_stream' 'rtsp://192.168.86.46/live/ch00_0' 'rtsp://192.168.86.46/live/ch01' 'rtsp://192.168.86.46:554/user=admin&password=&channel=1&stream=0.sdp' 'rtsp://192.168.86.46:554/ch01/0'; do OUT=$(ffmpeg -y -rtsp_transport tcp -i \"$URL\" -frames:v 1 -f image2 /tmp/probe.jpg -loglevel quiet 2>/dev/null && python3 -c \"from PIL import Image; i=Image.open('/tmp/probe.jpg'); print('$URL -> '+str(i.size[0])+'x'+str(i.size[1]))\" 2>/dev/null); if [ -n \"$OUT\" ]; then echo \"$OUT\"; fi; done || echo 'probe done'"
expect_output = ""
tags          = ["dvr-info"]

[services.koala-worker.verify.tests.ingest-raw]
type          = "shell"
command       = "curl -sf http://127.0.0.1:8082/admin/ingest/status -H 'Authorization: Bearer koala-dev-token' 2>/dev/null | python3 -c 'import sys,json; print(json.dumps(json.load(sys.stdin),indent=None))' | cut -c1-600"
expect_output = ""
tags          = ["ingest-raw"]

[services.koala-worker.verify.tests.model-loaded]
type          = "shell"
command       = "ls -lh /home/joe/baresystems/runtime/koala/worker/models/ 2>/dev/null && python3 -c 'import sys; sys.path.insert(0,\"/home/joe/baresystems/runtime/koala/worker/site\"); from koala_worker.detector import YoloDetector; import os; os.environ[\"KOALA_MODEL_DIR\"]=\"/home/joe/baresystems/runtime/koala/worker/models\"; d=YoloDetector(); print(\"model=gpu\" if d._model is not None else \"model=fallback\")' 2>&1 | tail -3"
expect_output = ""
tags          = ["model"]

# Snap-detect: capture a live frame from cam_1 and cam_6, run through worker, show labels.
# Diagnostic only (expect_output="") — read the failure message for actual detection output.
[services.koala-worker.verify.tests.snap-detect]
type          = "shell"
command       = "for CAM in 1 6; do ffmpeg -y -rtsp_transport tcp -i \"rtsp://192.168.86.46:554/user=admin&password=&channel=${CAM}&stream=0.sdp?real_stream\" -frames:v 1 -vf scale=640:-1 -f image2 /tmp/ks${CAM}.jpg -loglevel quiet 2>/dev/null; python3 -c \"import base64,json,urllib.request,datetime; cam='cam_${CAM}'; b64=base64.b64encode(open('/tmp/ks${CAM}.jpg','rb').read()).decode(); now=datetime.datetime.now(datetime.timezone.utc).isoformat(); body=json.dumps({'camera_id':cam,'zone_id':'front_door','frame_b64':b64,'captured_at':now}).encode(); resp=urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8090/v1/analyze/frame',body,{'Content-Type':'application/json'}),timeout=30); dets=json.loads(resp.read()).get('detections',[]); print(cam+': '+(', '.join(x['label']+'('+str(round(x['confidence'],2))+')' for x in dets) or 'none'))\" 2>/dev/null || echo \"cam_${CAM}: error\"; done"
expect_output = ""
tags          = ["snap"]

# Car-watch: sample cam_1 and cam_6, report any detections.
# Diagnostic only — read the failure message to see what was found.
[services.koala-worker.verify.tests.car-watch]
type          = "shell"
command       = "python3 -c \"import base64,json,urllib.request,datetime,subprocess,collections; counts=collections.defaultdict(int); [counts.__setitem__('cam_'+CAM+':'+d['label'],counts.get('cam_'+CAM+':'+d['label'],0)+1) for CAM in ['1','6'] for _ in [subprocess.run(['ffmpeg','-y','-rtsp_transport','tcp','-i','rtsp://192.168.86.46:554/user=admin&password=&channel='+CAM+'&stream=0.sdp?real_stream','-frames:v','1','-vf','scale=640:-1','-f','image2','/tmp/kw'+CAM+'.jpg','-loglevel','quiet'],capture_output=True,timeout=10)] if _.returncode==0 for b64 in [base64.b64encode(open('/tmp/kw'+CAM+'.jpg','rb').read()).decode()] for resp in [urllib.request.urlopen(urllib.request.Request('http://127.0.0.1:8090/v1/analyze/frame',json.dumps({'camera_id':'cam_'+CAM,'zone_id':'front_door','frame_b64':b64,'captured_at':datetime.datetime.now(datetime.timezone.utc).isoformat()}).encode(),{'Content-Type':'application/json'}),timeout=30)] for d in json.loads(resp.read()).get('detections',[])]; print('detections: '+str(dict(counts)) if counts else 'detections: none')\" 2>/dev/null || echo 'car-watch: error'"
expect_output = ""
tags          = ["car-watch"]

# Raw-yolo: capture a frame from cam_1, run YOLO directly with no confidence threshold.
# Shows everything YOLO sees — useful for diagnosing why vehicles might be below threshold.
[services.koala-worker.verify.tests.raw-yolo]
type          = "shell"
command       = "ffmpeg -y -rtsp_transport tcp -i 'rtsp://192.168.86.46:554/user=admin&password=&channel=1&stream=0.sdp?real_stream' -frames:v 1 -f image2 /tmp/raw_yolo.jpg -loglevel quiet 2>/dev/null && python3 -c \"import sys,os; sys.path.insert(0,'/home/joe/baresystems/runtime/koala/worker/site'); os.environ['KOALA_MODEL_DIR']='/home/joe/baresystems/runtime/koala/worker/models'; from ultralytics import YOLO; from PIL import Image; model=YOLO('/home/joe/baresystems/runtime/koala/worker/models/yolov8n.pt'); img=Image.open('/tmp/raw_yolo.jpg'); sz=os.path.getsize('/tmp/raw_yolo.jpg'); print('frame: '+str(img.size[0])+'x'+str(img.size[1])+' '+str(sz//1024)+'KB'); results=model.predict(img,verbose=False,conf=0.1); rows=[(model.names[int(b.cls[0])],round(float(b.conf[0]),2)) for r in results for b in r.boxes]; rows.sort(key=lambda x:-x[1]); print('top detections: '+', '.join(n+'='+str(c) for n,c in rows[:10]) if rows else 'nothing at conf>=0.1')\" 2>/dev/null || echo 'raw-yolo: error'"
expect_output = ""
tags          = ["raw-yolo"]

# ═══════════════════════════════════════════════════════════════════════════════
# koala-orchestrator — Go binary, manages camera feeds and inference dispatch
# Target: Jetson Orin Nano (ARM64, native binary, no Docker)
# Port: 8082 (MCP + HTTP)
# ═══════════════════════════════════════════════════════════════════════════════

[services.koala-orchestrator]
description  = "Koala orchestrator — camera management and inference dispatch"
port         = "8082"
service_name = "koala-orchestrator"

[services.koala-orchestrator.logs]
command = "tail -n 200 /home/joe/baresystems/runtime/koala/orchestrator/logs/orchestrator.log"

# ── Source ────────────────────────────────────────────────────────────────────

[services.koala-orchestrator.source]
workdir = "."
default = "linux-arm64"

[services.koala-orchestrator.source.builds.linux-arm64]
type          = "containerized_local_build"
image         = "golang:1.24"
mount         = ".:/workspace"
workdir       = "/workspace"
command       = "export PATH=/usr/local/go/bin:$PATH && mkdir -p bin && GOCACHE=/tmp/go-build GOMODCACHE=/tmp/go-mod GOOS=linux GOARCH=arm64 go build -o bin/koala-orchestrator-linux-arm64 ./cmd/koala-orchestrator"
artifact      = "bin/koala-orchestrator-linux-arm64"

# ── Pipeline ──────────────────────────────────────────────────────────────────

[services.koala-orchestrator.deploy]
target            = "jetson"
pipeline = ["fetch_artifact", "provision", "stop", "install", "start", "health_check", "verify"]

# ── Provision ─────────────────────────────────────────────────────────────────

[services.koala-orchestrator.provision]
dirs = [
  "{{runtime_dir}}/orchestrator/bin",
  "{{runtime_dir}}/orchestrator/data",
  "{{runtime_dir}}/orchestrator/logs",
  "{{runtime_dir}}/orchestrator/capability-cache"
]
script = """
CONFIG={{runtime_dir}}/orchestrator/data/koala.yaml
cat > "$CONFIG" << 'KOALA_CONFIG'
config_version: "1"
listen_addr: ":8082"
mcp_token: "koala-dev-token"
service:
  device_id: "koala-jetson-01"
  version: "0.1.0-dev"
  address: "http://192.168.86.247:8082"
worker:
  url: "http://127.0.0.1:8090"
  grpc_addr: "127.0.0.1:6706"
  protocol: "http"
runtime:
  queue_size: 64
  freshness_window_seconds: 90
  enable_stream_workers: true
  stream_sample_fps: 1
  stream_capture_timeout_seconds: 10
  min_detections: 1
  confidence_threshold: 0.5
update:
  enabled: false
  poll_enabled: false
  audit_db_path: "/tmp/koala/audit/events.db"
  staging_dir: "/tmp/koala/staging"
  active_dir: "/tmp/koala/active"
privacy:
  metadata_retention_seconds: 90
  frame_buffer_enabled: true
zones:
  - id: "front_door"
    name: "Front Door"
cameras:
  - id: "cam_1"
    name: "CAM 1"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=1&stream=0.sdp?real_stream"
    zone_id: "front_door"
    front_door: true
    probe_at_boot: true
  - id: "cam_2"
    name: "CAM 2"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=2&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_3"
    name: "CAM 3"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=3&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_4"
    name: "CAM 4"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=4&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_5"
    name: "CAM 5"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=5&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_6"
    name: "CAM 6"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=6&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_7"
    name: "CAM 7"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=7&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
  - id: "cam_8"
    name: "CAM 8"
    rtsp_url: "rtsp://192.168.86.46:554/user=admin&password=&channel=8&stream=0.sdp?real_stream"
    zone_id: "front_door"
    probe_at_boot: true
KOALA_CONFIG
echo "Wrote koala.yaml with 8 cameras."
"""

[services.koala-orchestrator.provision.env_file]
path = "{{runtime_dir}}/orchestrator/koala-orchestrator.env"

[services.koala-orchestrator.provision.env_file.seed]
KOALA_MCP_TOKEN  = "replace-me"
KOALA_DEVICE_ID  = "jetson-01"

# ── Install ───────────────────────────────────────────────────────────────────

[services.koala-orchestrator.install]
dest = "runtime/koala/orchestrator/bin/koala-orchestrator"

# ── Stop ──────────────────────────────────────────────────────────────────────

[services.koala-orchestrator.stop]
command = "killall koala-orchestrator 2>/dev/null || true"
#command = "pkill -f '{{runtime_dir}}/orchestrator/bin/koala-orchestrator' 2>/dev/null || true"

# ── Start ─────────────────────────────────────────────────────────────────────

[services.koala-orchestrator.start]
command = "chmod +x {{runtime_dir}}/orchestrator/bin/koala-orchestrator && (env PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin $(cat {{runtime_dir}}/orchestrator/koala-orchestrator.env | grep -v '^#' | xargs) KOALA_LISTEN_ADDR=:{{port}} nohup {{runtime_dir}}/orchestrator/bin/koala-orchestrator -config {{runtime_dir}}/orchestrator/data/koala.yaml </dev/null >> {{runtime_dir}}/orchestrator/logs/orchestrator.log 2>&1 &)"

# ── Health check ──────────────────────────────────────────────────────────────

[services.koala-orchestrator.health_check]
url      = "http://127.0.0.1:{{port}}/healthz"
timeout  = 30
interval = 2

# ── Inline tests ──────────────────────────────────────────────────────────────

[services.koala-orchestrator.verify]
tags = ["smoke", "health"]

[services.koala-orchestrator.verify.tests.health]
type          = "http"
url           = "http://127.0.0.1:{{port}}/healthz"
expect_status = 200
tags          = ["smoke"]

[services.koala-orchestrator.verify.tests.process-running]
type          = "shell"
command       = "pgrep -f '{{runtime_dir}}/orchestrator/bin/koala-orchestrator' >/dev/null 2>&1 && echo running || echo stopped"
expect_output = "running"
tags          = ["health"]

[services.koala-orchestrator.verify.tests.auth-required]
type          = "http"
url           = "http://127.0.0.1:{{port}}/mcp/tools/koala.get_system_health"
expect_status = 401
tags          = ["smoke"]

