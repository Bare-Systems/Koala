services:
  koala-worker:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.worker
    ports:
      - "127.0.0.1:6704:6704"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6704/v1/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  koala-orchestrator:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.orchestrator
    depends_on:
      koala-worker:
        condition: service_healthy
    network_mode: host
    volumes:
      - ../../configs/koala.homelab.yaml:/app/configs/koala.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6705/healthz > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  koala-live-ui:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.live-ui
      args:
        VITE_KOALA_API_BASE_URL: "http://192.168.86.53:6705"
        VITE_KOALA_TOKEN: "koala-dev-token"
    ports:
      - "9081:80"
    restart: unless-stopped
