services:
  koala-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker.blink
    environment:
      KOALA_TRANSPORT: "http"
    ports:
      - "127.0.0.1:8092:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  koala-orchestrator:
    build:
      context: .
      dockerfile: deploy/Dockerfile.orchestrator.amd64
    depends_on:
      koala-worker:
        condition: service_healthy
    network_mode: host
    volumes:
      - ./configs/koala.yaml:/app/configs/koala.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/healthz > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
